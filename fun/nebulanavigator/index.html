<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Navigator | Sci-Fi Snakes & Ladders</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <header>
            <h1>NEBULA NAVIGATOR</h1>
            <div id="game-stats">
                <div class="stat-box">
                    <span class="label">TURN</span>
                    <span id="player-turn" class="value">PLAYER 1</span>
                </div>
                <div class="stat-box">
                    <span class="label">LAST ROLL</span>
                    <span id="dice-value" class="value">-</span>
                </div>
            </div>
        </header>

        <main id="board-area">
            <div id="game-board">
                <!-- Tiles will be generated here -->
                <div id="tokens-layer">
                    <!-- Ship tokens -->
                </div>
            </div>
        </main>

        <footer>
            <div id="controls-hint">
                <kbd>SPACE</kbd> TO ROLL DICE
            </div>
        </footer>

        <div id="overlay" class="hidden">
            <div class="overlay-content">
                <h2 id="winner-text">COMMUNICATION RESTORED</h2>
                <p>Mission Successful. Sector Secured.</p>
                <button id="restart-btn">RE-INITIALIZE</button>
            </div>
        </div>
    </div>

    <!-- Audio (Procedural synthesis will be handled in JS, but hooks here if needed) -->
    <div id="ui-sounds"></div>

    <script src="game.js"></script>
</body>

</html>
