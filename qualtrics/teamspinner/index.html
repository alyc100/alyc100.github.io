<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>North EMEA SE Team Randomiser</title>
<style>
  :root{
    /* Qualtrics brand palette */
    --q-blue:#00b4ef; --q-blue-deep:#0768dd; --q-violet:#5f1ae5; --q-purple:#a54af4;
    --q-teal:#21dbaa; --q-cyan:#04c9ce;
    --ink:#2e2e38; --ink-soft:#5b5b6b; --line:#e7e9f1;
    --bg:#f6f8fc; --card:#ffffff;
    --grad:linear-gradient(90deg,var(--q-blue),var(--q-blue-deep),var(--q-violet),var(--q-purple));
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif;
    background:
      radial-gradient(900px 480px at 85% -8%,rgba(95,26,229,.10),transparent 60%),
      radial-gradient(800px 420px at 8% 0%,rgba(0,180,239,.12),transparent 60%),
      var(--bg);
    color:var(--ink);min-height:100vh;overflow-x:hidden;
  }
  #fireworks{position:fixed;inset:0;pointer-events:none;z-index:50}
  header{text-align:center;padding:30px 16px 6px}
  .brandrow{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;min-height:34px}
  .qlogo{height:40px;width:auto;max-width:min(80vw,420px);object-fit:contain}
  .wordmark{
    font-weight:800;font-size:26px;letter-spacing:-1px;line-height:1;
    background:linear-gradient(90deg,#5F1AE5,#0768DD,#00B4EE,#04C9CE);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .iris{width:26px;height:26px;border-radius:50%;
    background:conic-gradient(from 200deg,var(--q-blue),var(--q-cyan),var(--q-teal),var(--q-blue-deep),var(--q-violet),var(--q-purple),var(--q-blue));
    box-shadow:0 2px 8px rgba(95,26,229,.35)}
  .hub .iris{width:40px;height:40px}
  h1{
    font-size:clamp(26px,5vw,46px);font-weight:800;letter-spacing:-.5px;line-height:1.05;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  }
  h1#title{outline:none;border-radius:10px;padding:2px 10px;transition:background .15s;cursor:text;display:inline-block}
  h1#title:hover{background:rgba(95,26,229,.06)}
  h1#title:focus{background:rgba(95,26,229,.10);box-shadow:0 0 0 2px rgba(95,26,229,.25)}
  .sub{color:var(--ink-soft);font-size:14px;margin-top:8px}
  .edithint{color:var(--q-violet);font-weight:600}
  .topbar{display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:13px;color:var(--ink-soft)}
  .topbar label{display:flex;align-items:center;gap:7px;cursor:pointer}
  .topbar input{accent-color:var(--q-violet)}
  .wrap{
    display:grid;grid-template-columns:1fr 340px;gap:24px;
    max-width:1180px;margin:18px auto;padding:0 20px;align-items:start;
  }
  @media(max-width:880px){.wrap{grid-template-columns:1fr}}
  .stage{
    background:var(--card);border:1px solid var(--line);border-radius:24px;
    padding:26px;display:flex;flex-direction:column;align-items:center;gap:18px;
    box-shadow:0 18px 50px rgba(46,46,56,.08);
  }
  .wheel-box{position:relative;width:min(78vw,440px);height:min(78vw,440px)}
  canvas#wheel{width:100%;height:100%;border-radius:50%;
    box-shadow:0 0 0 12px #fff,0 0 0 14px var(--line),0 24px 60px rgba(7,104,221,.22)}
  .wheel-box.arming canvas#wheel{animation:glowpulse 1.1s ease-in-out infinite}
  .reel-box{position:relative;width:min(82vw,440px);height:348px;border-radius:20px;overflow:hidden;
    background:#fff;border:1px solid var(--line);box-shadow:0 0 0 12px #fff,0 0 0 14px var(--line),0 24px 60px rgba(7,104,221,.22)}
  .reel-box.arming{animation:reelglow 1.1s ease-in-out infinite}
  @keyframes reelglow{0%,100%{box-shadow:0 0 0 12px #fff,0 0 0 14px var(--line),0 24px 60px rgba(7,104,221,.22)}
    50%{box-shadow:0 0 0 12px #fff,0 0 0 14px var(--q-purple),0 0 70px rgba(165,74,244,.5)}}
  .reel-box::before,.reel-box::after{content:"";position:absolute;left:0;right:0;height:120px;z-index:3;pointer-events:none}
  .reel-box::before{top:0;background:linear-gradient(#fff,rgba(255,255,255,0))}
  .reel-box::after{bottom:0;background:linear-gradient(rgba(255,255,255,0),#fff)}
  .reel-strip{position:absolute;left:0;right:0;top:0;will-change:transform}
  .reel-row{position:absolute;left:0;right:0;display:flex;align-items:center;justify-content:center;
    font-weight:800;letter-spacing:-.3px;padding:0 14px;text-align:center}
  .reel-marker{position:absolute;left:8px;right:8px;top:50%;height:58px;transform:translateY(-50%);z-index:4;
    border-top:3px solid var(--q-violet);border-bottom:3px solid var(--q-violet);pointer-events:none;border-radius:6px}
  @keyframes glowpulse{0%,100%{box-shadow:0 0 0 12px #fff,0 0 0 14px var(--line),0 24px 60px rgba(7,104,221,.22)}
    50%{box-shadow:0 0 0 12px #fff,0 0 0 14px var(--q-purple),0 0 70px rgba(165,74,244,.5)}}
  .pointer{
    position:absolute;top:-10px;left:50%;transform:translateX(-50%);
    width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;
    border-top:36px solid var(--q-violet);filter:drop-shadow(0 3px 5px rgba(0,0,0,.25));z-index:5;
  }
  .hub{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:66px;height:66px;border-radius:50%;background:#fff;
    box-shadow:0 4px 16px rgba(46,46,56,.25);display:flex;align-items:center;justify-content:center;z-index:6;
  }
  .hub .iris{width:40px;height:40px}
  .btn{
    cursor:pointer;border:none;border-radius:14px;font-weight:700;font-size:16px;
    padding:15px 34px;color:#fff;background:var(--grad);background-size:200% 100%;
    box-shadow:0 10px 26px rgba(95,26,229,.30);transition:transform .12s,box-shadow .12s,opacity .2s,background-position .4s;
  }
  .btn:hover{transform:translateY(-2px);background-position:100% 0}
  .btn:active{transform:translateY(0)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn.live{animation:livepulse 1.5s ease-in-out infinite}
  @keyframes livepulse{0%,100%{box-shadow:0 10px 26px rgba(95,26,229,.30)}
    50%{box-shadow:0 10px 36px rgba(95,26,229,.6),0 0 0 4px rgba(165,74,244,.18)}}
  .btn.ghost{background:#fff;color:var(--q-blue-deep);border:1.5px solid var(--line);box-shadow:none}
  .btn.ghost:hover{border-color:var(--q-blue);color:var(--q-violet)}
  .controls{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
  .winner{
    min-height:54px;text-align:center;font-size:clamp(22px,4vw,40px);font-weight:800;letter-spacing:-.5px;
    background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
    display:flex;align-items:center;justify-content:center;
  }
  .winner.flash{animation:pop .5s ease}
  @keyframes pop{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .status{font-size:13px;color:var(--ink-soft);min-height:18px}
  .soundhint{margin-top:6px;font-size:13px;color:var(--q-violet);font-weight:700;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;animation:hintpulse 1.3s ease-in-out infinite}
  @keyframes hintpulse{0%,100%{opacity:.5}50%{opacity:1}}
  .side{background:var(--card);border:1px solid var(--line);border-radius:24px;padding:22px;box-shadow:0 18px 50px rgba(46,46,56,.08)}
  .side h2{font-size:15px;margin-bottom:14px;color:var(--ink);letter-spacing:.2px;text-transform:uppercase;font-weight:800}
  .count{color:var(--q-violet);font-weight:700;font-size:13px}
  .addrow{display:flex;gap:8px;margin-bottom:14px}
  input[type=text]{
    flex:1;background:#fff;border:1.5px solid var(--line);border-radius:10px;
    color:var(--ink);padding:11px 12px;font-size:14px;outline:none;
  }
  input[type=text]:focus{border-color:var(--q-blue)}
  .add-btn{background:var(--q-violet);color:#fff;border:none;border-radius:10px;padding:0 16px;cursor:pointer;font-size:20px;font-weight:700}
  .add-btn:hover{background:var(--q-purple)}
  ul#names{list-style:none;display:flex;flex-direction:column;gap:7px;max-height:340px;overflow-y:auto}
  ul#names li{display:flex;align-items:center;gap:9px;background:#fbfcfe;border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  ul#names li .nm{flex:1;font-size:14px;color:var(--ink)}
  ul#names li .nm[contenteditable]{outline:none;border-radius:6px;padding:2px 4px}
  ul#names li .nm[contenteditable]:focus{background:rgba(0,180,239,.12)}
  .del{background:none;border:none;color:#b9bdcc;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px}
  .del:hover{color:#ff2d6f;background:rgba(255,45,111,.1)}
  .toolbar,.importrow{display:flex;gap:8px;margin-top:12px}
  .toolbar .btn,.importrow .btn{flex:1;padding:10px;font-size:12.5px}
  .empty{color:var(--ink-soft);font-size:13px;text-align:center;padding:18px}
  textarea#pasteArea{width:100%;margin-top:10px;min-height:120px;background:#fff;border:1.5px solid var(--line);border-radius:10px;color:var(--ink);padding:10px;font-size:14px;outline:none;resize:vertical}
  textarea#pasteArea:focus{border-color:var(--q-blue)}
  .picked-log{margin-top:16px;font-size:13px;color:var(--ink-soft);text-align:center}
  .picked-log span{color:var(--q-violet);font-weight:600}
  .flyoff{position:absolute;z-index:40;pointer-events:none;padding:10px 20px;border-radius:14px;
    font-weight:800;font-size:22px;color:#fff;box-shadow:0 12px 32px rgba(46,46,56,.4);white-space:nowrap;transform:translate(-50%,-50%)}
  footer{text-align:center;color:var(--ink-soft);font-size:12px;padding:10px 0 30px}
  .credit{position:fixed;right:16px;bottom:12px;z-index:60;font-size:15px;color:var(--ink-soft);
    background:rgba(255,255,255,.7);backdrop-filter:blur(4px);padding:6px 12px;border-radius:10px;border:1px solid var(--line)}
</style>
</head>
<body>
<canvas id="fireworks"></canvas>

<header>
  <div class="brandrow">
    <img id="qLogo" class="qlogo" alt="Qualtrics XM" style="display:none">
    <span id="wordmark" class="wordmark">Qualtrics</span>
  </div>
  <h1 id="title" contenteditable="true" spellcheck="false" title="Click to edit the title">Qualtrics Team Randomiser</h1>
  <div class="sub">Spin the wheel · cryptographically random · winners drop out automatically · <span class="edithint">click the title to rename</span></div>
  <div class="topbar">
    <label><input type="checkbox" id="soundToggle" checked> Sound effects</label>
    <label><input type="checkbox" id="musicToggle"> Tension music</label>
    <label><input type="checkbox" id="layoutToggle"> Reel mode</label>
    <label><input type="checkbox" id="removeToggle" checked> Remove winner after pick</label>
  </div>
  <div class="soundhint" id="soundHint" style="display:none">🔊 Tap anywhere to start the tension music</div>
</header>

<div class="wrap">
  <div class="stage">
    <div class="wheel-box" id="wheelBox">
      <div class="pointer"></div>
      <canvas id="wheel" width="600" height="600"></canvas>
      <div class="hub"><span class="iris"></span></div>
    </div>
    <div class="reel-box" id="reelBox" style="display:none">
      <div class="reel-strip" id="reelStrip"></div>
      <div class="reel-marker"></div>
    </div>
    <div class="winner" id="winner"></div>
    <div class="status" id="status"></div>
    <div class="controls">
      <button class="btn" id="spinBtn">SPIN</button>
      <button class="btn ghost" id="resetBtn">Reset list</button>
    </div>
    <div class="picked-log" id="pickedLog"></div>
  </div>

  <div class="side">
    <h2>Names <span class="count" id="count"></span></h2>
    <div class="addrow">
      <input type="text" id="addInput" placeholder="Add a name…" autocomplete="off">
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <ul id="names"></ul>
    <div class="toolbar">
      <button class="btn ghost" id="shuffleBtn">Shuffle</button>
      <button class="btn ghost" id="clearBtn">Clear all</button>
    </div>
    <div class="importrow">
      <button class="btn ghost" id="importBtn">📂 Import .txt</button>
      <button class="btn ghost" id="pasteBtn">📋 Paste list</button>
    </div>
    <input type="file" id="fileInput" accept=".txt,.csv,text/plain" style="display:none">
    <textarea id="pasteArea" placeholder="Paste names here — one per line (or comma-separated)…" style="display:none"></textarea>
    <div class="importrow" id="pasteActions" style="display:none">
      <button class="btn" id="pasteAddBtn">Add names</button>
      <button class="btn ghost" id="pasteCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<footer>Built for the North EMEA SE Team · Qualtrics</footer>
<div class="credit">Written by Alex Lee Yuk Cheung and Claude</div>

<script>
"use strict";

/* ---------- True randomness via crypto ---------- */
function secureRandom(){
  const u=new Uint32Array(1);crypto.getRandomValues(u);return u[0]/4294967296;
}
function secureInt(n){
  if(n<=0) return 0;
  const max=Math.floor(4294967296/n)*n;const u=new Uint32Array(1);let v;
  do{crypto.getRandomValues(u);v=u[0];}while(v>=max);
  return v%n;
}
function secureShuffle(arr){
  for(let i=arr.length-1;i>0;i--){const j=secureInt(i+1);[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

/* ---------- State ---------- */
const DEFAULT_NAMES=["Alex","Sam","Priya","Mateo","Lena","Tom","Yara","Kasper","Noor","Felix"];
let names=[...DEFAULT_NAMES];
let pickedHistory=[];
let phase="idle";            // idle | arming | spinning | reveal
let rotation=0;
let idleRAF=null;
let layout="wheel";          // "wheel" | "reel"
let reelPos=0;               // reel scroll position in px
const ROWH=58;               // reel row height

/* ---------- Qualtrics brand colours ---------- */
const PALETTE=["#00b4ef","#0768dd","#5f1ae5","#a54af4","#04c9ce","#21dbaa"];
function textOn(hex){          // pick readable label colour by luminance
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.6?"#10202e":"#ffffff";
}
/* Segment colours: discrete brand palette for small lists, a distinct spectrum for large ones */
function segColor(i,n){
  if(n<=PALETTE.length) return PALETTE[i%PALETTE.length];
  const hue=192+(i/n)*156;                 // cyan-blue → violet → magenta, across the brand range
  return `hsl(${hue.toFixed(0)},70%,53%)`;
}
function segText(i,n){
  if(n<=PALETTE.length) return textOn(PALETTE[i%PALETTE.length]);
  return "#ffffff";
}

/* ---------- Elements ---------- */
const wheel=document.getElementById('wheel');
const ctx=wheel.getContext('2d');
const wheelBox=document.getElementById('wheelBox');
const reelBox=document.getElementById('reelBox');
const reelStrip=document.getElementById('reelStrip');
const spinBtn=document.getElementById('spinBtn');
const winnerEl=document.getElementById('winner');
const statusEl=document.getElementById('status');
const listEl=document.getElementById('names');
const countEl=document.getElementById('count');
const addInput=document.getElementById('addInput');
const pickedLog=document.getElementById('pickedLog');
const soundToggle=document.getElementById('soundToggle');
const musicToggle=document.getElementById('musicToggle');
const layoutToggle=document.getElementById('layoutToggle');
const removeToggle=document.getElementById('removeToggle');

/* ---------- Draw the wheel ---------- */
function drawWheel(){
  const R=wheel.width/2,cx=R,cy=R;
  ctx.clearRect(0,0,wheel.width,wheel.height);
  const n=names.length;
  if(n===0){
    ctx.fillStyle="#eef1f8";ctx.beginPath();ctx.arc(cx,cy,R-6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#9aa3bd";ctx.font="600 26px Segoe UI,sans-serif";
    ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("Add names →",cx,cy);
    return;
  }
  const seg=Math.PI*2/n;
  const size=Math.max(8.5,Math.min(26,560/n));          // scales down further for big lists
  const maxLen=n>30?18:n>20?20:n>14?22:24;              // far less aggressive truncation
  for(let i=0;i<n;i++){
    const start=rotation+i*seg,end=start+seg;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R-6,start,end);ctx.closePath();
    ctx.fillStyle=segColor(i,n);ctx.fill();
    ctx.strokeStyle="rgba(255,255,255,.55)";ctx.lineWidth=n>30?1:2;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+seg/2);
    ctx.textAlign="right";ctx.textBaseline="middle";
    ctx.fillStyle=segText(i,n);
    ctx.font=`700 ${size}px Segoe UI,sans-serif`;
    let label=names[i];
    if(label.length>maxLen) label=label.slice(0,maxLen-1)+"…";
    ctx.fillText(label,R-16,0);ctx.restore();
  }
}

/* ---------- Draw the reel (slot-machine layout) ---------- */
function reelLabel(s){return s.length>26?s.slice(0,25)+"…":s;}
function drawReel(){
  const n=names.length;
  const VH=reelBox.clientHeight||348;
  if(n===0){
    reelStrip.innerHTML='<div class="reel-row" style="top:'+(VH/2-29)+'px;height:58px;color:#9aa3bd;font-size:22px">Add names →</div>';
    return;
  }
  const listH=n*ROWH;
  const pos=((reelPos%listH)+listH)%listH;          // bounded scroll position
  const centerY=VH/2-ROWH/2;
  const size=Math.max(15,Math.min(28,30));          // names stay full-size in reel mode
  const mStart=Math.floor((pos-centerY)/ROWH)-1;
  const mEnd=Math.ceil((pos+VH-centerY)/ROWH)+1;
  let html="";
  for(let m=mStart;m<=mEnd;m++){
    const idx=((m%n)+n)%n;
    const y=centerY+m*ROWH-pos;
    // distance from centre → fade & shrink slightly for depth
    const d=Math.abs((y+ROWH/2)-VH/2)/(VH/2);
    const op=Math.max(0.25,1-d*0.9);
    html+='<div class="reel-row" style="top:'+y.toFixed(1)+'px;height:'+ROWH+'px;font-size:'+size+
      'px;color:'+segColor(idx,n)+';opacity:'+op.toFixed(2)+'">'+escapeHtml(reelLabel(names[idx]))+'</div>';
  }
  reelStrip.innerHTML=html;
}
function redraw(){ if(layout==="reel") drawReel(); else drawWheel(); }

/* ---------- Render name list ---------- */
function renderList(){
  listEl.innerHTML="";
  if(names.length===0){listEl.innerHTML='<div class="empty">No names left. Add some, import, or reset.</div>';}
  names.forEach((name,idx)=>{
    const li=document.createElement('li');
    const sw=document.createElement('span');
    sw.style.cssText="width:12px;height:12px;border-radius:50%;flex:0 0 auto;background:"+segColor(idx,names.length);
    const nm=document.createElement('span');
    nm.className="nm";nm.textContent=name;nm.contentEditable="true";nm.spellcheck=false;
    nm.addEventListener('blur',()=>{const v=nm.textContent.trim();if(v){names[idx]=v;}else{nm.textContent=name;}redraw();saveState();});
    nm.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();nm.blur();}});
    const del=document.createElement('button');
    del.className="del";del.innerHTML="✕";del.title="Remove";
    del.addEventListener('click',()=>{names.splice(idx,1);renderList();redraw();saveState();});
    li.append(sw,nm,del);listEl.appendChild(li);
  });
  countEl.textContent="("+names.length+")";
  if(phase==="arming"||phase==="idle") spinBtn.disabled=names.length<1;
}

/* ---------- Web Audio ---------- */
let actx=null;
function audio(){
  if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended'){try{actx.resume();}catch(e){}}
  return actx;
}
function tick(){
  if(!soundToggle.checked) return;
  const a=audio();const o=a.createOscillator();const g=a.createGain();
  o.type="square";o.frequency.value=900;
  g.gain.setValueAtTime(.04,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.05);
  o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.05);
}
function fanfare(){
  if(!soundToggle.checked) return;
  const a=audio();const now=a.currentTime;const notes=[523.25,659.25,783.99,1046.5];
  notes.forEach((f,i)=>{
    const o=a.createOscillator();const g=a.createGain();o.type="triangle";o.frequency.value=f;
    const t=now+i*0.12;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+0.03);
    g.gain.exponentialRampToValueAtTime(.001,t+0.5);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.5);
  });
  for(let i=0;i<6;i++){
    const o=a.createOscillator();const g=a.createGain();o.type="sine";o.frequency.value=1200+secureInt(1600);
    const t=now+0.5+i*0.06;g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+0.25);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+0.25);
  }
}

/* ---------- Tension music (looping suspense bed) ---------- */
const tension={
  running:false,nodes:[],beatTimer:null,rate:780,
  start(){
    if(!musicToggle.checked||this.running) return;
    const a=audio();this.running=true;this.rate=600;   // constant tempo (no acceleration)
    // low drone
    const o=a.createOscillator(),f=a.createBiquadFilter(),g=a.createGain();
    o.type="sawtooth";o.frequency.value=55;f.type="lowpass";f.frequency.value=190;
    g.gain.value=0;o.connect(f);f.connect(g);g.connect(a.destination);o.start();
    g.gain.setTargetAtTime(0.07,a.currentTime,1.5);
    // shimmering tremolo pad
    const o2=a.createOscillator(),g2=a.createGain();
    o2.type="sine";o2.frequency.value=233;g2.gain.value=0;
    o2.connect(g2);g2.connect(a.destination);o2.start();
    g2.gain.setTargetAtTime(0.05,a.currentTime,3);
    const lfo=a.createOscillator(),lg=a.createGain();
    lfo.type="sine";lfo.frequency.value=5.5;lg.gain.value=0.04;
    lfo.connect(lg);lg.connect(g2.gain);lfo.start();
    // slowly rise the drone pitch for mounting tension
    o.frequency.setTargetAtTime(70,a.currentTime,8);
    o2.frequency.setTargetAtTime(294,a.currentTime,9);
    this.nodes=[o,o2,lfo];this.gains=[g,g2];
    // accelerating heartbeat
    const beat=()=>{
      if(!this.running) return;
      this.thump();
      this.beatTimer=setTimeout(beat,this.rate);     // steady, not accelerating
    };
    beat();
    // tense melodic ostinato — an original climbing motif (harmonic-minor flavour)
    // that rises in pitch and quickens to build anticipation before the reveal.
    this.mStep=0;this.mTranspose=0;this.mRate=215;
    const motif=[0,7,8,7, 0,8,11,8, 3,10,11,12];   // semitone offsets, suspenseful climb
    const playMelody=()=>{
      if(!this.running) return;
      const base=196.00;                            // G3
      const semis=motif[this.mStep%motif.length]+this.mTranspose;
      this.pluck(base*Math.pow(2,semis/12),0.17,0.12,"triangle");
      if(this.mStep%motif.length===0){              // soft anchor note under each phrase
        this.pluck(base*Math.pow(2,(this.mTranspose-12)/12),0.55,0.07,"sine");
      }
      this.mStep++;
      if(this.mStep%motif.length===0){
        this.mTranspose=Math.min(this.mTranspose+1,8);   // pitch climbs (tension) but tempo stays constant
      }
      this.melodyTimer=setTimeout(playMelody,this.mRate);
    };
    setTimeout(playMelody,320);
  },
  pluck(freq,dur,vol,type){
    const a=audio();const o=a.createOscillator();const g=a.createGain();
    o.type=type||"triangle";o.frequency.value=freq;
    const t=a.currentTime;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+dur+0.05);
  },
  thump(){
    const a=audio();const o=a.createOscillator();const g=a.createGain();
    o.type="sine";o.frequency.setValueAtTime(125,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(42,a.currentTime+0.18);
    g.gain.setValueAtTime(0.5,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.28);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.3);
  },
  stop(){
    if(!this.running) return;
    this.running=false;
    if(this.beatTimer)clearTimeout(this.beatTimer);
    if(this.melodyTimer)clearTimeout(this.melodyTimer);
    const a=audio();
    (this.gains||[]).forEach(g=>{try{g.gain.cancelScheduledValues(a.currentTime);g.gain.setTargetAtTime(0.0001,a.currentTime,0.08);}catch(e){}});
    this.nodes.forEach(n=>{try{n.stop(a.currentTime+0.25);}catch(e){}});
    this.nodes=[];this.gains=[];
  }
};

/* ---------- Fireworks ---------- */
const fw=document.getElementById('fireworks');
const fctx=fw.getContext('2d');
let particles=[];
function sizeFw(){fw.width=innerWidth;fw.height=innerHeight;}
sizeFw();addEventListener('resize',sizeFw);
const FW_HUES=[197,210,265,280,168];
function burst(x,y){
  const baseHue=FW_HUES[secureInt(FW_HUES.length)];
  const count=60+secureInt(40);
  for(let i=0;i<count;i++){
    const ang=secureRandom()*Math.PI*2;const spd=1+secureRandom()*6;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,hue:baseHue+secureInt(40)-20,size:2+secureRandom()*2});
  }
}
function fwLoop(){
  fctx.clearRect(0,0,fw.width,fw.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.vy+=0.05;p.vx*=0.99;p.vy*=0.99;p.x+=p.vx;p.y+=p.vy;p.life-=0.012;
    fctx.globalAlpha=Math.max(p.life,0);fctx.fillStyle=`hsl(${p.hue},90%,58%)`;
    fctx.beginPath();fctx.arc(p.x,p.y,p.size,0,Math.PI*2);fctx.fill();
  }
  fctx.globalAlpha=1;requestAnimationFrame(fwLoop);
}
fwLoop();
function celebrate(){
  let n=0;const iv=setInterval(()=>{
    burst(innerWidth*(0.2+secureRandom()*0.6),innerHeight*(0.2+secureRandom()*0.4));
    if(++n>=6)clearInterval(iv);
  },260);
}

/* ---------- Spin flow: idle → arming (tension) → spinning ---------- */
spinBtn.addEventListener('click',()=>{
  if(phase==="arming") releaseSpin();   // "SPIN" and "OK" both release the next pick
});

function setGlow(on){[wheelBox,reelBox].forEach(b=>b&&b.classList.toggle('arming',on));}
function armTension(label){
  phase="arming";
  spinBtn.textContent=label||"SPIN";
  spinBtn.classList.add('live');
  setGlow(true);
  spinBtn.disabled=names.length<1;
  statusEl.textContent=names.length<1?"Add names to begin spinning.":"Ready — press to pick a name";
  startIdleRotation();
  startTensionAudio();
}
function startIdleRotation(){
  if(idleRAF) return;
  let last=performance.now();
  const spd=0.000525;        // wheel: rad/ms, constant
  const reelSpd=0.022;       // reel: px/ms, constant slow drift
  (function idle(now){
    if(phase!=="arming"){idleRAF=null;return;}
    const dt=now-last;last=now;
    if(layout==="reel"){reelPos+=dt*reelSpd;drawReel();}
    else{rotation+=dt*spd;drawWheel();}
    idleRAF=requestAnimationFrame(idle);
  })(last);
}
function showSoundHint(){const h=document.getElementById('soundHint');if(h&&musicToggle.checked)h.style.display='inline-flex';}
function hideSoundHint(){const h=document.getElementById('soundHint');if(h)h.style.display='none';}
function startTensionAudio(){
  if(!musicToggle.checked){hideSoundHint();return;}   // no hint when tension music is off
  const a=audio();                                  // creates + attempts resume
  if(a.state==="suspended"){
    // Browsers block audio until a user gesture — start music on the first interaction.
    showSoundHint();
    const kick=()=>{
      audio();
      hideSoundHint();
      if(phase==="arming"&&musicToggle.checked) tension.start();
      ["pointerdown","keydown","touchstart","click"].forEach(ev=>window.removeEventListener(ev,kick));
    };
    ["pointerdown","keydown","touchstart","click"].forEach(ev=>window.addEventListener(ev,kick));
  }else{
    hideSoundHint();
    tension.start();
  }
}

function releaseSpin(){
  if(names.length<1) return;
  if(idleRAF){cancelAnimationFrame(idleRAF);idleRAF=null;}
  phase="spinning";
  spinBtn.classList.remove('live');
  setGlow(false);
  spinBtn.disabled=true;spinBtn.textContent="SPINNING…";
  winnerEl.textContent="";winnerEl.classList.remove('flash');
  statusEl.textContent="";
  tension.stop();

  const winnerIdx=secureInt(names.length);      // truly random winner
  if(layout==="reel") spinReel(winnerIdx); else spinWheel(winnerIdx);
}

function spinWheel(winnerIdx){
  const n=names.length;const seg=Math.PI*2/n;
  const pointerAng=1.5*Math.PI;
  const midOffset=(winnerIdx+0.5)*seg;
  const turns=5+secureInt(4);
  const jitter=(secureRandom()-0.5)*seg*0.6;
  const targetRot=turns*2*Math.PI+(pointerAng-midOffset)+jitter;
  const startRot=rotation%(2*Math.PI);
  const totalDelta=targetRot-startRot;
  const duration=4200+secureInt(800);
  const startTime=performance.now();
  let lastSeg=-1;
  function frame(now){
    const t=Math.min((now-startTime)/duration,1);
    const ease=1-Math.pow(1-t,3);
    rotation=startRot+totalDelta*ease;
    drawWheel();
    const curSeg=Math.floor((pointerAng-rotation)/seg);
    if(curSeg!==lastSeg){lastSeg=curSeg;tick();}
    if(t<1){requestAnimationFrame(frame);}else{finishSpin(winnerIdx);}
  }
  requestAnimationFrame(frame);
}

function spinReel(winnerIdx){
  const n=names.length,listH=n*ROWH;
  const startPos=reelPos;
  const base=winnerIdx*ROWH;                    // pos where winner sits centred
  const wraps=4+secureInt(3);                   // full passes for drama
  // smallest target >= startPos + wraps*listH that is ≡ base (mod listH)
  let target=base+Math.ceil((startPos+wraps*listH-base)/listH)*listH;
  const delta=target-startPos;
  const duration=4200+secureInt(800);
  const startTime=performance.now();
  let lastRow=-1;
  function frame(now){
    const t=Math.min((now-startTime)/duration,1);
    const ease=1-Math.pow(1-t,3);
    reelPos=startPos+delta*ease;
    drawReel();
    const row=Math.floor(reelPos/ROWH);
    if(row!==lastRow){lastRow=row;tick();}
    if(t<1){requestAnimationFrame(frame);}else{reelPos=target%listH;drawReel();finishSpin(winnerIdx);}
  }
  requestAnimationFrame(frame);
}

function finishSpin(idx){
  const name=names[idx];const color=segColor(idx,names.length);
  winnerEl.textContent="🏆 "+name;winnerEl.classList.add('flash');
  pickedHistory.push(name);fanfare();celebrate();updatePickedLog();
  if(removeToggle.checked){
    flyOff(name,color);
    names.splice(idx,1);
    renderList();
    setTimeout(redraw,180);
  }else{renderList();redraw();}
  saveState();
  // Show the result for a beat, then automatically re-arm (tension + rotation) for the next pick.
  phase="reveal";
  spinBtn.textContent="SPIN";spinBtn.disabled=true;
  setTimeout(()=>{
    if(names.length>=1){
      armTension("SPIN");
    }else{
      phase="idle";setGlow(false);
      spinBtn.classList.remove('live');spinBtn.disabled=true;spinBtn.textContent="SPIN";
      statusEl.textContent="No names left — reset or add more.";
    }
  },1600);
}

/* Animate the winning name flying off the wheel */
function flyOff(name,color){
  const rect=(layout==="reel"?reelBox:wheelBox).getBoundingClientRect();
  const chip=document.createElement('div');
  chip.className='flyoff';chip.textContent='🏆 '+name;chip.style.background=color;
  chip.style.left=(rect.left+rect.width/2)+'px';chip.style.top=(rect.top+18)+'px';
  document.body.appendChild(chip);
  const dir=secureRandom()<0.5?-1:1;
  const dx=dir*(180+secureRandom()*220);const dy=-(160+secureRandom()*180);const rot=dir*(180+secureRandom()*360);
  chip.animate([
    {transform:'translate(-50%,-50%) scale(.6) rotate(0deg)',opacity:0},
    {transform:'translate(-50%,-50%) scale(1.25) rotate(0deg)',opacity:1,offset:0.18},
    {transform:`translate(calc(-50% + ${dx*0.5}px),calc(-50% + ${dy*0.5}px)) scale(1.1) rotate(${rot*0.5}deg)`,opacity:1,offset:0.55},
    {transform:`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px)) scale(.4) rotate(${rot}deg)`,opacity:0}
  ],{duration:1300,easing:'cubic-bezier(.22,.61,.36,1)'});
  setTimeout(()=>chip.remove(),1350);
}

function updatePickedLog(){
  if(pickedHistory.length===0){pickedLog.textContent="";return;}
  pickedLog.innerHTML="Picked so far: "+pickedHistory.map(n=>`<span>${escapeHtml(n)}</span>`).join(", ");
}
function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

/* ---------- List controls ---------- */
function addName(){
  const v=addInput.value.trim();if(!v) return;
  v.split(/[\n,]+/).map(s=>s.trim()).filter(Boolean).forEach(x=>names.push(x));
  addInput.value="";renderList();redraw();saveState();
}
document.getElementById('addBtn').addEventListener('click',addName);
addInput.addEventListener('keydown',e=>{if(e.key==='Enter')addName();});
document.getElementById('shuffleBtn').addEventListener('click',()=>{secureShuffle(names);renderList();redraw();saveState();});
document.getElementById('clearBtn').addEventListener('click',()=>{names=[];pickedHistory=[];winnerEl.textContent="";updatePickedLog();renderList();redraw();saveState();});
document.getElementById('resetBtn').addEventListener('click',()=>{
  tension.stop();if(idleRAF){cancelAnimationFrame(idleRAF);idleRAF=null;}
  phase="idle";
  names=[...DEFAULT_NAMES];pickedHistory=[];winnerEl.textContent="";winnerEl.classList.remove('flash');updatePickedLog();renderList();
  saveState();
  armTension("SPIN");
});

/* ---------- Import / paste ---------- */
const fileInput=document.getElementById('fileInput');
document.getElementById('importBtn').addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f) return;
  const reader=new FileReader();reader.onload=()=>addBulk(reader.result);reader.readAsText(f);fileInput.value="";
});
const pasteArea=document.getElementById('pasteArea');const pasteActions=document.getElementById('pasteActions');
document.getElementById('pasteBtn').addEventListener('click',()=>{pasteArea.style.display='block';pasteActions.style.display='flex';pasteArea.focus();});
document.getElementById('pasteCancelBtn').addEventListener('click',()=>{pasteArea.value="";pasteArea.style.display='none';pasteActions.style.display='none';});
document.getElementById('pasteAddBtn').addEventListener('click',()=>{addBulk(pasteArea.value);pasteArea.value="";pasteArea.style.display='none';pasteActions.style.display='none';});
function addBulk(text){
  if(!text) return;
  const incoming=text.split(/[\n,\t;]+/).map(s=>s.trim()).filter(Boolean);
  const seen=new Set(names.map(n=>n.toLowerCase()));
  for(const nm of incoming){if(!seen.has(nm.toLowerCase())){names.push(nm);seen.add(nm.toLowerCase());}}
  renderList();redraw();saveState();
}

/* ---------- Persistence (localStorage) — works on GitHub Pages / any static host ---------- */
const LS_KEY="northEmeaSeRandomiser.v1";
const DEFAULT_TITLE="Qualtrics Team Randomiser";
const titleEl=document.getElementById('title');
function saveState(){
  try{localStorage.setItem(LS_KEY,JSON.stringify({
    title:(titleEl.textContent||"").trim(),
    names,pickedHistory,layout,sound:soundToggle.checked,music:musicToggle.checked,remove:removeToggle.checked
  }));}catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem(LS_KEY);if(!raw) return;
    const s=JSON.parse(raw);
    if(typeof s.title==="string"&&s.title.trim()){titleEl.textContent=s.title.trim();document.title=s.title.trim();}
    if(Array.isArray(s.names)) names=s.names;
    if(Array.isArray(s.pickedHistory)) pickedHistory=s.pickedHistory;
    if(s.layout==="reel"||s.layout==="wheel"){layout=s.layout;layoutToggle.checked=(layout==="reel");}
    if(typeof s.sound==="boolean") soundToggle.checked=s.sound;
    if(typeof s.music==="boolean") musicToggle.checked=s.music;
    if(typeof s.remove==="boolean") removeToggle.checked=s.remove;
  }catch(e){}
}
// Editable title — commit + persist on blur or Enter
titleEl.addEventListener('blur',()=>{
  let t=(titleEl.textContent||"").replace(/\s+/g," ").trim();
  if(!t){t=DEFAULT_TITLE;titleEl.textContent=t;}
  document.title=t;saveState();
});
titleEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();titleEl.blur();}});
soundToggle.addEventListener('change',saveState);   // sound effects only
musicToggle.addEventListener('change',()=>{
  if(!musicToggle.checked){tension.stop();hideSoundHint();}
  else if(phase==="arming") startTensionAudio();
  saveState();
});
removeToggle.addEventListener('change',saveState);
function applyLayout(){
  if(layout==="reel"){reelBox.style.display="block";wheelBox.style.display="none";}
  else{wheelBox.style.display="block";reelBox.style.display="none";}
  redraw();
}
layoutToggle.addEventListener('change',()=>{
  layout=layoutToggle.checked?"reel":"wheel";
  applyLayout();
  if(phase==="arming") setGlow(true);
  saveState();
});

/* ---------- Brand logo loader: use the official file if present in the folder ---------- */
(function loadLogo(){
  const img=document.getElementById('qLogo');
  const wordmark=document.getElementById('wordmark');
  const candidates=["qualtrics-logo.png","qualtrics-logo.svg","qualtrics-xm-logo.png",
                    "Qualtrics-logo.png","qualtrics-logo.jpg","qualtrics.png","logo.png"];
  let i=0;
  img.onload=()=>{img.style.display='inline-block';if(wordmark)wordmark.style.display='none';};
  img.onerror=()=>{ i++; if(i<candidates.length){img.src=candidates[i];} else {img.style.display='none';} };
  img.src=candidates[0];
})();

/* ---------- Init ---------- */
loadState();
applyLayout();         // show wheel or reel per saved preference
renderList();updatePickedLog();
armTension();          // tension + slow rotation begin on load (music starts on first interaction)
</script>
